<!DOCTYPE html>
<html>
<head>
    <title>3D Model Study</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #25253d;
            border-radius: 16px;
            padding: 40px;
            max-width: 520px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
        h1 { margin-top: 0; font-size: 1.6em; }
        p { line-height: 1.6; color: #ccc; }
        label { display: block; margin: 20px 0 8px; font-weight: 600; }
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #1a1a2e;
            color: #eee;
            font-size: 1em;
            box-sizing: border-box;
        }
        button {
            margin-top: 24px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #6c5ce7;
            color: white;
            font-size: 1.05em;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #5b4bd1; }
    </style>
</head>
<body>
    <div class="card">
        <h1>3D Model Comparison Study</h1>
        <p>
            You'll be shown short videos of 3D models generated from text descriptions.
            For each object, you'll pick which version looks best, then rate the final result.
            It should take about 5–10 minutes. Thanks for participating!
        </p>
        <form action="{{ url_for('start') }}" method="get">
            <label for="birth_year">Birth year (optional, for demographic info only)</label>
            <input type="number" id="birth_year" name="birth_year" min="1920" max="2020" placeholder="e.g. 1998">
            <button type="submit">Start Study</button>
        </form>
    </div>
</body>
</html>
