<!DOCTYPE html>
<html>
<head>
    <title>Rate the Model</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .progress { color: #888; font-size: 0.9em; margin-bottom: 8px; }
        .progress-bar-bg { background: #333; border-radius: 6px; height: 6px; margin-bottom: 24px; overflow: hidden; }
        .progress-bar-fill { background: #6c5ce7; height: 100%; }
        h1 { font-size: 1.5em; margin-bottom: 4px; }
        .prompt { color: #aaa; margin-bottom: 24px; }
        .prompt strong { color: #fff; }
        .video-wrap {
            background: #25253d;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 28px;
        }
        video {
            width: 100%;
            border-radius: 8px;
            background: #000;
            display: block;
        }
        .scale {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 28px;
        }
        .scale-option {
            background: #25253d;
            border-radius: 10px;
            padding: 14px 18px;
            cursor: pointer;
            border: 3px solid transparent;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: border-color 0.15s;
        }
        .scale-option:hover { border-color: #6c5ce7; }
        .scale-option.selected { border-color: #6c5ce7; background: #2e2e4d; }
        .scale-num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #6c5ce7;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9em;
            flex-shrink: 0;
        }
        .scale-text { color: #ddd; }
        button {
            display: block;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #6c5ce7;
            color: white;
            font-size: 1.05em;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled { background: #444; cursor: not-allowed; }
        button:not(:disabled):hover { background: #5b4bd1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="progress">Object {{ current }} of {{ total }}</div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" style="width: {{ (current / total * 100)|round(1) }}%"></div>
        </div>

        <h1>How well does this match the prompt?</h1>
        <div class="prompt">Target object: <strong>{{ label }}</strong></div>

        <div class="video-wrap">
            <video autoplay loop muted playsinline>
                <source src="{{ url_for('serve_video', filename=obj + '/' + video + '.mp4') }}" type="video/mp4">
            </video>
        </div>

        <form method="post" id="rateForm">
            <div class="scale">
                {% for lbl in rating_labels %}
                <label class="scale-option" for="rate_{{ loop.index }}">
                    <div class="scale-num">{{ loop.index }}</div>
                    <div class="scale-text">{{ lbl }}</div>
                    <input type="radio" name="rating" value="{{ loop.index }}" id="rate_{{ loop.index }}" style="display:none" required>
                </label>
                {% endfor %}
            </div>
            <button type="submit" id="submitBtn" disabled>
                {% if current == total %}Finish{% else %}Continue{% endif %}
            </button>
        </form>
    </div>

    <script>
        const options = document.querySelectorAll('.scale-option');
        const submitBtn = document.getElementById('submitBtn');
        options.forEach(opt => {
            opt.addEventListener('click', () => {
                options.forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                submitBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
